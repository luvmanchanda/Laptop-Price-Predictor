<!DOCTYPE html>
<html>
<head>
    <title>Laptop Predictor</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            font-size:18px;
        }

        h2{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Laptop Predictor</h2>

<form method="POST">

<label>Brand</label>
<select name="company">
{% for i in company %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<label>Type</label>
<select name="type">
{% for i in types %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<label>RAM (GB)</label>
<select name="ram">
<option>2</option>
<option>4</option>
<option>6</option>
<option>8</option>
<option>12</option>
<option>16</option>
<option>24</option>
<option>32</option>
<option>64</option>
</select>

<label>Weight</label>
<input type="number" step="0.1" name="weight" required>

<label>Touchscreen</label>
<select name="touchscreen">
<option>No</option>
<option>Yes</option>
</select>

<label>IPS</label>
<select name="ips">
<option>No</option>
<option>Yes</option>
</select>

<label>Screen Size</label>
<input type="number" step="0.1" name="screen_size" value="13">

<label>Resolution</label>
<select name="resolution">
<option>1920x1080</option>
<option>1366x768</option>
<option>1600x900</option>
<option>3840x2160</option>
<option>3200x1800</option>
<option>2880x1800</option>
<option>2560x1600</option>
<option>2560x1440</option>
<option>2304x1440</option>
</select>

<label>CPU</label>
<select name="cpu">
{% for i in cpu %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<label>HDD</label>
<select name="hdd">
<option>0</option>
<option>128</option>
<option>256</option>
<option>512</option>
<option>1024</option>
<option>2048</option>
</select>

<label>SSD</label>
<select name="ssd">
<option>0</option>
<option>8</option>
<option>128</option>
<option>256</option>
<option>512</option>
<option>1024</option>
</select>

<label>GPU</label>
<select name="gpu">
{% for i in gpu %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<label>OS</label>
<select name="os">
{% for i in os %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<button type="submit">Predict Price</button>

</form>

{% if prediction %}

<h2>
The predicted price of this configuration is ₹{{prediction}}
</h2>

{% endif %}

</div>

</body>
</html>
